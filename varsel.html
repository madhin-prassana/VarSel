<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VarSel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #13100d;
            --surf:     #1b1712;
            --surf2:    #221d17;
            --surf3:    #2c261e;
            --border:   #38302a;
            --text:     #ede0cc;
            --muted:    #7a6e60;
            --accent:   #c9a96e;
            --m1:       #e07a5a;
            --m2:       #5aaa82;
            --m3:       #5a8fc4;
            --mh:       #c47ab8;
        }

        html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* ── LAYOUT ── */
        .app { display: flex; height: 100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 228px; min-width: 228px;
            background: var(--surf);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar-logo {
            padding: 26px 22px 18px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.65rem; font-weight: 700;
            color: var(--accent); letter-spacing: 0.03em;
        }
        .sidebar-logo p {
            font-size: 0.68rem; color: var(--muted);
            letter-spacing: 0.1em; text-transform: uppercase;
            margin-top: 3px; font-weight: 400;
        }

        .sidebar-nav { padding: 14px 10px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 7px;
            cursor: pointer; color: var(--muted);
            font-size: 0.85rem; font-weight: 500;
            transition: all 0.15s; margin-bottom: 2px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: var(--surf2); color: var(--text); }
        .nav-item.active { background: var(--surf3); color: var(--accent); border-color: var(--border); }
        .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

        .sidebar-members {
            padding: 14px 22px 16px;
            border-top: 1px solid var(--border);
        }
        .sidebar-members h3 {
            font-size: 0.62rem; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 10px; font-weight: 600;
        }
        .member-item {
            display: flex; align-items: center; gap: 9px;
            padding: 5px 0; font-size: 0.82rem; color: var(--text);
        }
        .member-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

        .sidebar-actions {
            padding: 12px 10px; border-top: 1px solid var(--border);
            display: flex; gap: 6px;
        }
        .btn-sm {
            flex: 1; padding: 7px 6px;
            background: var(--surf3); border: 1px solid var(--border);
            color: var(--muted); border-radius: 6px;
            font-size: 0.73rem; font-family: 'DM Sans', sans-serif;
            cursor: pointer; transition: all 0.15s; font-weight: 500;
        }
        .btn-sm:hover { color: var(--accent); border-color: var(--accent); }

        /* ── MAIN ── */
        .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* Year summary strip */
        .year-strip {
            display: flex; align-items: center; gap: 0;
            border-bottom: 1px solid var(--border);
            background: var(--surf);
            flex-shrink: 0;
        }
        .strip-item {
            padding: 12px 20px;
            border-right: 1px solid var(--border);
        }
        .strip-label {
            font-size: 0.62rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
            margin-bottom: 3px; font-weight: 600;
            display: flex; align-items: center; gap: 6px;
        }
        .strip-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .strip-amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
        }

        /* Calendar header */
        .cal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 10;
            background: var(--bg); flex-shrink: 0;
        }
        .cal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.45rem; color: var(--text);
        }
        .cal-nav { display: flex; align-items: center; gap: 6px; }
        .nav-btn {
            height: 30px; padding: 0 10px; min-width: 30px;
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500;
            transition: all 0.15s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

        .view-tabs {
            display: flex; gap: 3px;
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 7px; padding: 3px;
        }
        .view-tab {
            padding: 5px 13px; border-radius: 5px;
            font-size: 0.78rem; font-weight: 500; cursor: pointer;
            color: var(--muted); transition: all 0.15s;
            font-family: 'DM Sans', sans-serif; border: none; background: none;
        }
        .view-tab.active { background: var(--surf3); color: var(--accent); }
        .view-tab:hover:not(.active) { color: var(--text); }

        /* ── MONTH VIEW ── */
        .month-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
        }
        .day-header-cell {
            padding: 9px 10px;
            text-align: center;
            font-size: 0.66rem; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--muted);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
        }
        .day-cell {
            min-height: 108px; padding: 8px;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.12s; position: relative;
        }
        .day-cell:hover { background: var(--surf); }
        .day-cell.is-today { background: var(--surf2); }
        .day-cell.other-month { opacity: 0.45; }
        .day-num {
            font-size: 0.78rem; font-weight: 600;
            color: var(--muted); margin-bottom: 5px;
        }
        .day-cell.is-today .day-num { color: var(--accent); }
        .exp-pill {
            display: flex; align-items: center; gap: 4px;
            font-size: 0.68rem; padding: 2px 5px;
            border-radius: 3px; margin-bottom: 2px;
            overflow: hidden; white-space: nowrap;
        }
        .exp-pip { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .more-label { font-size: 0.64rem; color: var(--muted); margin-top: 1px; }
        .day-total-label {
            position: absolute; bottom: 5px; right: 7px;
            font-size: 0.66rem; color: var(--muted);
        }

        /* ── WEEK VIEW ── */
        .week-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            border-left: 1px solid var(--border);
            border-top: 1px solid var(--border);
            flex: 1;
        }
        .week-col { border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .week-col-header {
            padding: 12px 10px; text-align: center;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .week-col-header:hover { background: var(--surf); }
        .week-day-name { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; }
        .week-day-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem; color: var(--text); margin-top: 2px;
        }
        .week-col-header.is-today .week-day-num { color: var(--accent); }
        .week-entries { padding: 8px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .week-card {
            padding: 6px 8px; border-radius: 5px;
            font-size: 0.72rem; border-left: 3px solid;
            background: var(--surf); transition: background 0.12s;
            cursor: pointer;
        }
        .week-card:hover { background: var(--surf2); }
        .week-card-cat { font-weight: 600; color: var(--text); }
        .week-card-sub { color: var(--muted); margin-top: 1px; }

        /* ── DAY VIEW ── */
        .day-view { max-width: 660px; margin: 0 auto; padding: 28px 32px; width: 100%; }
        .day-view-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; color: var(--text);
        }
        .day-view-sub { font-size: 0.85rem; color: var(--muted); margin-top: 4px; margin-bottom: 24px; }
        .day-row {
            display: flex; align-items: center; gap: 14px;
            padding: 13px 16px; background: var(--surf);
            border: 1px solid var(--border); border-radius: 8px;
            margin-bottom: 8px; border-left: 4px solid;
        }
        .day-row-info { flex: 1; }
        .day-row-cat { font-weight: 600; font-size: 0.875rem; }
        .day-row-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .day-row-amt {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
        }
        .del-btn {
            background: none; border: none; color: var(--muted);
            cursor: pointer; padding: 4px 6px; border-radius: 4px;
            font-size: 0.85rem; transition: all 0.15s; line-height: 1;
        }
        .del-btn:hover { color: var(--m1); background: rgba(224,122,90,0.1); }
        .empty-state { text-align: center; color: var(--muted); padding: 60px 0; font-size: 0.875rem; line-height: 1.7; }

        /* ── YEAR VIEW ── */
        .year-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 14px; padding: 24px 28px;
        }
        .month-card {
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px;
            cursor: pointer; transition: all 0.18s;
        }
        .month-card:hover { border-color: var(--accent); transform: translateY(-1px); }
        .month-card.current-month { border-color: var(--accent); }
        .month-card-name {
            font-size: 0.66rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
            margin-bottom: 6px; font-weight: 600;
        }
        .month-card-total {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem; color: var(--text); margin-bottom: 10px;
        }
        .month-bar {
            display: flex; height: 4px; border-radius: 2px;
            overflow: hidden; gap: 1px; margin-bottom: 10px;
        }
        .month-bar-seg { height: 100%; }
        .month-breakdown { display: flex; flex-direction: column; gap: 4px; }
        .breakdown-row {
            display: flex; justify-content: space-between;
            font-size: 0.7rem;
        }
        .breakdown-name { color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .breakdown-pip { width: 6px; height: 6px; border-radius: 50%; }
        .breakdown-amt { color: var(--text); font-weight: 500; }

        /* ── MODAL ── */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(2px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none;
            transition: opacity 0.2s;
        }
        .overlay.open { opacity: 1; pointer-events: all; }
        .modal {
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 12px; width: 460px; padding: 28px;
            transform: translateY(10px); transition: transform 0.2s;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .overlay.open .modal { transform: translateY(0); }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; margin-bottom: 20px; color: var(--text);
        }
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block; font-size: 0.68rem;
            text-transform: uppercase; letter-spacing: 0.08em;
            color: var(--muted); margin-bottom: 6px; font-weight: 600;
        }
        .form-input, .form-select {
            width: 100%; padding: 9px 11px;
            background: var(--surf2); border: 1px solid var(--border);
            border-radius: 7px; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
            transition: border-color 0.15s; outline: none;
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }
        .form-select option { background: var(--surf2); color: var(--text); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .member-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
        .member-btn {
            padding: 8px 6px; border-radius: 7px;
            border: 2px solid var(--border); background: var(--surf2);
            font-family: 'DM Sans', sans-serif; font-size: 0.73rem;
            cursor: pointer; text-align: center; transition: all 0.15s;
            font-weight: 500; line-height: 1.3;
        }
        .member-btn:hover { border-color: var(--border); filter: brightness(1.1); }

        .form-actions {
            display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px;
        }
        .btn-cancel {
            padding: 8px 18px; background: var(--surf2);
            border: 1px solid var(--border); border-radius: 7px;
            color: var(--muted); font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
        }
        .btn-cancel:hover { color: var(--text); }
        .btn-primary {
            padding: 8px 20px; background: var(--accent);
            border: none; border-radius: 7px; color: var(--bg);
            font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
            font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .btn-primary:hover { opacity: 0.85; }

        /* ── SETTINGS MODAL ── */
        .settings-section { margin-bottom: 20px; }
        .settings-section h4 {
            font-size: 0.68rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
            margin-bottom: 10px; font-weight: 600;
        }
        .name-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .color-swatch { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

        /* ── ANALYSIS PAGE ── */
        .analysis-wrap { padding: 28px 32px; max-width: 1100px; width: 100%; margin: 0 auto; }
        .analysis-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 28px;
        }
        .analysis-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
        }
        .analysis-year-nav { display: flex; align-items: center; gap: 8px; }
        .analysis-year-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; min-width: 52px; text-align: center;
        }
        .section-title {
            font-size: 0.68rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted);
            font-weight: 600; margin-bottom: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-title::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .analysis-section { margin-bottom: 36px; }

        /* Member spend cards */
        .member-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
        .member-spend-card {
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; border-top: 3px solid;
        }
        .msc-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
        .msc-total { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 4px; }
        .msc-pct { font-size: 0.75rem; color: var(--muted); margin-bottom: 10px; }
        .msc-avg { font-size: 0.75rem; color: var(--muted); }
        .msc-top { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .msc-top-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
        .msc-top-item { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 2px 0; }
        .msc-top-cat { color: var(--muted); }
        .msc-top-amt { font-weight: 500; }

        /* Household vs personal */
        .split-bar-wrap { background: var(--surf); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
        .split-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin: 12px 0; }
        .split-labels { display: flex; justify-content: space-between; }
        .split-label { font-size: 0.75rem; display: flex; align-items: center; gap: 6px; }

        /* Category breakdown */
        .cat-table { width: 100%; border-collapse: collapse; }
        .cat-table th {
            text-align: left; font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--muted); font-weight: 600;
            padding: 8px 10px; border-bottom: 1px solid var(--border);
        }
        .cat-table th:not(:first-child) { text-align: right; }
        .cat-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 0.82rem; vertical-align: middle; }
        .cat-table td:not(:first-child) { text-align: right; }
        .cat-table tr:last-child td { border-bottom: none; }
        .cat-table tr:hover td { background: var(--surf2); }
        .cat-bar-cell { width: 120px; }
        .cat-bar-bg { background: var(--surf3); border-radius: 2px; height: 5px; }
        .cat-bar-fill { height: 5px; border-radius: 2px; background: var(--accent); }
        .cat-pct { color: var(--muted); font-size: 0.72rem; }

        /* Month-over-month table */
        .mom-wrap { overflow-x: auto; }
        .mom-table { width: 100%; border-collapse: collapse; min-width: 700px; }
        .mom-table th {
            font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em;
            color: var(--muted); font-weight: 600; padding: 7px 8px;
            border-bottom: 1px solid var(--border); text-align: right;
        }
        .mom-table th:first-child { text-align: left; }
        .mom-table td { padding: 7px 8px; font-size: 0.75rem; border-bottom: 1px solid var(--border); text-align: right; color: var(--muted); }
        .mom-table td:first-child { text-align: left; color: var(--text); font-weight: 500; }
        .mom-table td.has-val { color: var(--text); }
        .mom-table tr:hover td { background: var(--surf2); }
        .mom-table tr:last-child td { border-bottom: none; font-weight: 600; color: var(--text); }

        /* Top expenses */
        .top-list { display: flex; flex-direction: column; gap: 6px; }
        .top-item {
            display: flex; align-items: center; gap: 12px;
            background: var(--surf); border: 1px solid var(--border);
            border-radius: 8px; padding: 11px 14px; border-left: 3px solid;
        }
        .top-rank { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--muted); min-width: 22px; }
        .top-info { flex: 1; }
        .top-cat { font-weight: 600; font-size: 0.85rem; }
        .top-sub { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
        .top-amt { font-family: 'Playfair Display', serif; font-size: 1.05rem; }

        /* YoY table */
        .yoy-table { width: 100%; border-collapse: collapse; }
        .yoy-table th { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; }
        .yoy-table th:first-child { text-align: left; }
        .yoy-table td { padding: 8px 10px; font-size: 0.82rem; border-bottom: 1px solid var(--border); text-align: right; }
        .yoy-table td:first-child { text-align: left; font-weight: 500; }
        .yoy-table tr:last-child td { border-bottom: none; }
        .yoy-table tr:hover td { background: var(--surf2); }
        .delta-up { color: #e07a5a; font-size: 0.72rem; }
        .delta-down { color: #5aaa82; font-size: 0.72rem; }
        .no-data { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 30px 0; }

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
<div class="app">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1>VarSel</h1>
            <p>Varavu Selavu</p>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-item active" id="nav-calendar" onclick="switchNav('calendar')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                Calendar
            </div>
            <div class="nav-item" id="nav-add" onclick="openExpenseModal(null)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                Add Expense
            </div>
            <div class="nav-item" id="nav-year" onclick="switchNav('year')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-7"/></svg>
                Year Summary
            </div>
            <div class="nav-item" id="nav-analysis" onclick="switchNav('analysis')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
                Analysis
            </div>
            <div class="nav-item" id="nav-settings" onclick="openSettings()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Settings
            </div>
        </nav>

        <div class="sidebar-members">
            <h3>Members</h3>
            <div id="member-legend"></div>
        </div>

        <div class="sidebar-actions">
            <button class="btn-sm" onclick="exportData()">⬇ Export</button>
            <button class="btn-sm" onclick="triggerImport()">⬆ Import</button>
            <input type="file" id="import-input" accept=".json" style="display:none" onchange="handleImport(event)">
        </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main" id="main"></main>
</div>

<!-- ── ADD EXPENSE MODAL ── -->
<div class="overlay" id="expense-overlay" onclick="maybeCloseExpense(event)">
    <div class="modal">
        <div class="modal-title">Add Expense</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" class="form-input" id="f-date">
            </div>
            <div class="form-group">
                <label class="form-label">Amount (₹)</label>
                <input type="number" class="form-input" id="f-amount" placeholder="0" min="0" step="1">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Category</label>
            <select class="form-select" id="f-category"></select>
        </div>
        <div class="form-group">
            <label class="form-label">Member</label>
            <div class="member-grid" id="f-members"></div>
        </div>
        <div class="form-group">
            <label class="form-label">Notes <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label>
            <input type="text" class="form-input" id="f-notes" placeholder="Add a note...">
        </div>
        <div class="form-actions">
            <button class="btn-cancel" onclick="closeExpenseModal()">Cancel</button>
            <button class="btn-primary" id="btn-save-expense" onclick="saveExpense()">Save Expense</button>
        </div>
    </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div class="overlay" id="settings-overlay" onclick="maybeCloseSettings(event)">
    <div class="modal">
        <div class="modal-title">Settings</div>
        <div class="settings-section">
            <h4>Member Names</h4>
            <div id="settings-members"></div>
        </div>
        <div class="settings-section">
            <h4>Categories</h4>
            <div id="settings-cats" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"></div>
            <div style="display:flex;gap:8px">
                <input type="text" class="form-input" id="new-cat-input" placeholder="New category..." style="flex:1">
                <button class="btn-primary" style="padding:8px 14px" onclick="addCategory()">Add</button>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn-primary" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════
    let state = {
        members: [
            { id: 'm1', name: 'Member 1', color: '#e07a5a' },
            { id: 'm2', name: 'Member 2', color: '#5aaa82' },
            { id: 'm3', name: 'Member 3', color: '#5a8fc4' },
            { id: 'mh', name: 'Household', color: '#c47ab8' },
        ],
        categories: [
            'Dining Out','Groceries','Transport','Utilities',
            'Entertainment','Shopping','Healthcare','Rent',
            'Mobile','Education','Travel','Clothing',
            'Personal Care','Insurance','Subscriptions','Miscellaneous'
        ],
        expenses: [],
        view: 'calendar',   // calendar | year | analysis
        calMode: 'month',   // day | week | month | year
        navDate: new Date(),
        selectedMember: null,
        editingId: null,     // id of expense being edited, null = add mode
        analysisYear: new Date().getFullYear(),
    };

    // ═══════════════════════════════════════════════════════════
    // PERSISTENCE
    // ═══════════════════════════════════════════════════════════
    function persist() {
        localStorage.setItem('varsel_v1', JSON.stringify({
            expenses: state.expenses,
            members: state.members,
            categories: state.categories,
        }));
    }
    function hydrate() {
        try {
            const raw = localStorage.getItem('varsel_v1');
            if (!raw) return;
            const d = JSON.parse(raw);
            if (d.expenses) state.expenses = d.expenses;
            if (d.members) state.members = d.members;
            if (d.categories) state.categories = d.categories;
        } catch(e) {}
    }

    // ═══════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════
    const MONTH_NAMES = ['January','February','March','April','May','June',
        'July','August','September','October','November','December'];
    const DAY_NAMES   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function rupee(n) {
        return '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
    }
    function member(id) { return state.members.find(m => m.id === id); }
    function sameDay(a, b) {
        return a.getFullYear()===b.getFullYear() &&
            a.getMonth()===b.getMonth() &&
            a.getDate()===b.getDate();
    }
    function localDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth()+1).padStart(2,'0');
        const d = String(date.getDate()).padStart(2,'0');
        return `${y}-${m}-${d}`;
    }
    function todayStr() { return localDateStr(new Date()); }
    function parseDate(str) { return new Date(str + 'T00:00:00'); }
    function expsForDay(date) { return state.expenses.filter(e => sameDay(parseDate(e.date), date)); }
    function expsForMonth(y, m) {
        return state.expenses.filter(e => {
            const d = parseDate(e.date);
            return d.getFullYear()===y && d.getMonth()===m;
        });
    }
    function expsForYear(y) {
        return state.expenses.filter(e => parseDate(e.date).getFullYear()===y);
    }
    function sumAmounts(arr) { return arr.reduce((s,e) => s + Number(e.amount), 0); }
    function memberTotal(memberId, arr) {
        return sumAmounts(arr.filter(e => e.memberId === memberId));
    }
    function weekStart(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        return d;
    }

    // ═══════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════
    function drillToDay(ds) {
        state.navDate = parseDate(ds);
        state.calMode = 'day';
        state.view = 'calendar';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-calendar').classList.add('active');
        renderApp();
    }

    function switchNav(view) {
        state.view = view;
        if (view === 'year') state.calMode = 'year';
        else if (view === 'calendar') state.calMode = 'month';
        renderApp();
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const navId = view === 'year' ? 'nav-year' : view === 'analysis' ? 'nav-analysis' : 'nav-calendar';
        document.getElementById(navId).classList.add('active');
    }

    function navigate(dir) {
        const d = new Date(state.navDate);
        switch(state.calMode) {
            case 'day':   d.setDate(d.getDate() + dir); break;
            case 'week':  d.setDate(d.getDate() + dir * 7); break;
            case 'month': d.setMonth(d.getMonth() + dir); break;
            case 'year':  d.setFullYear(d.getFullYear() + dir); break;
        }
        state.navDate = d;
        renderApp();
    }

    function goToday() { state.navDate = new Date(); renderApp(); }

    function setCalMode(mode) {
        state.calMode = mode;
        state.view = mode === 'year' ? 'year' : 'calendar';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(mode === 'year' ? 'nav-year' : 'nav-calendar').classList.add('active');
        renderApp();
    }

    function drillToMonth(month) {
        state.navDate = new Date(state.navDate.getFullYear(), month, 1);
        state.calMode = 'month';
        state.view = 'calendar';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-calendar').classList.add('active');
        renderApp();
    }

    // ═══════════════════════════════════════════════════════════
    // RENDER – MAIN ENTRY
    // ═══════════════════════════════════════════════════════════
    function renderApp() {
        renderLegend();
        const main = document.getElementById('main');
        if (state.view === 'analysis') {
            main.innerHTML = renderAnalysisPage();
            return;
        }
        main.innerHTML = renderStrip() + renderHeader() + renderCalView();
    }

    // ─── Strip ───
    function renderStrip() {
        const year = state.navDate.getFullYear();
        const yExps = expsForYear(year);
        const total = sumAmounts(yExps);

        let html = `<div class="year-strip">
    <div class="strip-item">
      <div class="strip-label">${year} Total</div>
      <div class="strip-amount">${rupee(total)}</div>
    </div>`;
        state.members.forEach(m => {
            const mt = memberTotal(m.id, yExps);
            html += `<div class="strip-item">
      <div class="strip-label"><span class="strip-dot" style="background:${m.color}"></span>${m.name}</div>
      <div class="strip-amount" style="color:${m.color}">${rupee(mt)}</div>
    </div>`;
        });
        html += '</div>';
        return html;
    }

    // ─── Header ───
    function renderHeader() {
        let title = '';
        const d = state.navDate;
        switch(state.calMode) {
            case 'day':   title = d.toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'}); break;
            case 'week': {
                const ws = weekStart(d);
                const we = new Date(ws); we.setDate(we.getDate()+6);
                title = `${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()} – ${MONTH_NAMES[we.getMonth()]} ${we.getDate()}, ${we.getFullYear()}`;
                break;
            }
            case 'month': title = `${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`; break;
            case 'year':  title = `${d.getFullYear()}`; break;
        }

        return `<div class="cal-header">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="cal-nav">
        <button class="nav-btn" onclick="navigate(-1)">←</button>
        <button class="nav-btn" onclick="goToday()">Today</button>
        <button class="nav-btn" onclick="navigate(1)">→</button>
      </div>
      <div class="cal-title">${title}</div>
    </div>
    <div class="view-tabs">
      ${['day','week','month','year'].map(m =>
            `<button class="view-tab ${state.calMode===m?'active':''}" onclick="setCalMode('${m}')">${cap(m)}</button>`
        ).join('')}
    </div>
  </div>`;
    }
    function cap(s) { return s[0].toUpperCase() + s.slice(1); }

    // ─── Dispatch ───
    function renderCalView() {
        switch(state.calMode) {
            case 'month': return renderMonthView();
            case 'week':  return renderWeekView();
            case 'day':   return renderDayView();
            case 'year':  return renderYearView();
        }
    }

    // ═══════════════════════════════════════════════════════════
    // MONTH VIEW
    // ═══════════════════════════════════════════════════════════
    function renderMonthView() {
        const y = state.navDate.getFullYear(), mo = state.navDate.getMonth();
        const firstDay = new Date(y, mo, 1);
        const lastDay  = new Date(y, mo+1, 0);
        const today    = new Date();

        let html = '<div class="month-grid">';
        DAY_NAMES.forEach(dn => html += `<div class="day-header-cell">${dn}</div>`);

        // Leading cells from prev month
        for (let i = 0; i < firstDay.getDay(); i++) {
            const pd = new Date(y, mo, -firstDay.getDay()+i+1);
            html += dayCell(pd, true, today);
        }
        // Current month
        for (let d = 1; d <= lastDay.getDate(); d++) {
            html += dayCell(new Date(y, mo, d), false, today);
        }
        // Trailing cells
        const trailing = (7 - (firstDay.getDay()+lastDay.getDate()) % 7) % 7;
        for (let i = 1; i <= trailing; i++) {
            html += dayCell(new Date(y, mo+1, i), true, today);
        }

        html += '</div>';
        return html;
    }

    function dayCell(date, other, today) {
        const exps = expsForDay(date);
        const total = sumAmounts(exps);
        const isToday = sameDay(date, today);
        const ds = localDateStr(date);

        let html = `<div class="day-cell ${other?'other-month':''} ${isToday?'is-today':''}" onclick="drillToDay('${ds}')">`;
        html += `<div class="day-num">${date.getDate()}</div>`;

        exps.slice(0,3).forEach(e => {
            const m = member(e.memberId);
            if (!m) return;
            html += `<div class="exp-pill" style="background:${m.color}18">
      <span class="exp-pip" style="background:${m.color}"></span>
      <span style="color:${m.color};font-weight:600">${rupee(e.amount)}</span>
      <span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis"> ${e.category}</span>
    </div>`;
        });
        if (exps.length > 3) html += `<div class="more-label">+${exps.length-3} more</div>`;
        if (total > 0) html += `<div class="day-total-label">${rupee(total)}</div>`;

        html += '</div>';
        return html;
    }

    // ═══════════════════════════════════════════════════════════
    // WEEK VIEW
    // ═══════════════════════════════════════════════════════════
    function renderWeekView() {
        const ws = weekStart(state.navDate);
        const today = new Date();

        let html = '<div class="week-grid">';
        for (let i = 0; i < 7; i++) {
            const d = new Date(ws); d.setDate(d.getDate()+i);
            const isToday = sameDay(d, today);
            const exps = expsForDay(d);
            const ds = localDateStr(d);

            html += `<div class="week-col">
      <div class="week-col-header ${isToday?'is-today':''}" onclick="openExpenseModal('${ds}')">
        <div class="week-day-name">${DAY_NAMES[d.getDay()]}</div>
        <div class="week-day-num">${d.getDate()}</div>
      </div>
      <div class="week-entries">`;

            exps.forEach(e => {
                const m = member(e.memberId);
                if (!m) return;
                html += `<div class="week-card" style="border-color:${m.color}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
          <div>
            <div class="week-card-cat">${e.category}</div>
            <div class="week-card-sub" style="color:${m.color}">${rupee(e.amount)} · ${m.name}</div>
            ${e.notes ? `<div class="week-card-sub" style="margin-top:2px">${e.notes}</div>` : ''}
          </div>
          <button class="del-btn" onclick="openEditModal('${e.id}',event)" title="Edit" style="color:var(--accent);font-size:0.75rem;padding:2px 4px">✎</button>
        </div>
      </div>`;
            });

            html += '</div></div>';
        }
        html += '</div>';
        return html;
    }

    // ═══════════════════════════════════════════════════════════
    // DAY VIEW
    // ═══════════════════════════════════════════════════════════
    function renderDayView() {
        const exps = expsForDay(state.navDate);
        const total = sumAmounts(exps);
        const ds = localDateStr(state.navDate);
        const label = state.navDate.toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

        let html = `<div class="day-view">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px">
      <div>
        <div class="day-view-title">${label}</div>
        <div class="day-view-sub">${exps.length} expense${exps.length!==1?'s':''} &nbsp;·&nbsp; ${rupee(total)}</div>
      </div>
      <button class="btn-primary" onclick="openExpenseModal('${ds}')">+ Add Expense</button>
    </div>`;

        if (exps.length === 0) {
            html += `<div class="empty-state">No expenses recorded for this day.<br>Click "Add Expense" to get started.</div>`;
        } else {
            // Group by member for a nice summary
            html += `<div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">`;
            state.members.forEach(m => {
                const mt = memberTotal(m.id, exps);
                if (mt > 0) {
                    html += `<div style="background:${m.color}14;border:1px solid ${m.color}30;border-radius:7px;padding:8px 14px">
          <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:${m.color};margin-bottom:3px">${m.name}</div>
          <div style="font-family:'Playfair Display',serif;font-size:1rem;color:${m.color}">${rupee(mt)}</div>
        </div>`;
                }
            });
            html += `</div>`;

            exps.forEach(e => {
                const m = member(e.memberId);
                if (!m) return;
                html += `<div class="day-row" style="border-left-color:${m.color}">
        <div class="day-row-info">
          <div class="day-row-cat">${e.category}</div>
          <div class="day-row-sub"><span style="color:${m.color}">${m.name}</span>${e.notes ? ' · ' + e.notes : ''}</div>
        </div>
        <div class="day-row-amt" style="color:${m.color}">${rupee(e.amount)}</div>
        <button class="del-btn" onclick="openEditModal('${e.id}',event)" title="Edit" style="color:var(--accent)">✎</button>
        <button class="del-btn" onclick="deleteExpense('${e.id}',event)" title="Delete">✕</button>
      </div>`;
            });
        }

        html += '</div>';
        return html;
    }

    // ═══════════════════════════════════════════════════════════
    // YEAR VIEW
    // ═══════════════════════════════════════════════════════════
    function renderYearView() {
        const y = state.navDate.getFullYear();
        const today = new Date();

        let html = '<div class="year-grid">';
        for (let mo = 0; mo < 12; mo++) {
            const exps = expsForMonth(y, mo);
            const total = sumAmounts(exps);
            const isCurrent = today.getFullYear()===y && today.getMonth()===mo;

            html += `<div class="month-card ${isCurrent?'current-month':''}" onclick="drillToMonth(${mo})">
      <div class="month-card-name">${MONTH_NAMES[mo]}</div>
      <div class="month-card-total">${rupee(total)}</div>`;

            if (total > 0) {
                html += '<div class="month-bar">';
                state.members.forEach(m => {
                    const mt = memberTotal(m.id, exps);
                    if (mt > 0) {
                        const pct = (mt/total*100).toFixed(1);
                        html += `<div class="month-bar-seg" style="background:${m.color};width:${pct}%"></div>`;
                    }
                });
                html += '</div><div class="month-breakdown">';
                state.members.forEach(m => {
                    const mt = memberTotal(m.id, exps);
                    if (mt > 0) {
                        html += `<div class="breakdown-row">
            <span class="breakdown-name"><span class="breakdown-pip" style="background:${m.color}"></span>${m.name}</span>
            <span class="breakdown-amt">${rupee(mt)}</span>
          </div>`;
                    }
                });
                html += '</div>';
            } else {
                html += '<div style="font-size:0.72rem;color:var(--muted);margin-top:4px">No entries</div>';
            }

            html += '</div>';
        }
        html += '</div>';
        return html;
    }

    // ═══════════════════════════════════════════════════════════
    // ANALYSIS PAGE
    // ═══════════════════════════════════════════════════════════
    function renderAnalysisPage() {
        const y = state.analysisYear;
        const yExps = expsForYear(y);
        const total = sumAmounts(yExps);
        const monthsElapsed = y === new Date().getFullYear()
            ? new Date().getMonth() + 1 : 12;
        const avgMonthly = total / monthsElapsed;

        let html = `<div class="analysis-wrap">
    <div class="analysis-header">
      <div class="analysis-title">Analysis</div>
      <div class="analysis-year-nav">
        <button class="nav-btn" onclick="analysisNav(-1)">←</button>
        <div class="analysis-year-label">${y}</div>
        <button class="nav-btn" onclick="analysisNav(1)">→</button>
      </div>
    </div>`;

        // ── 1. Member spend cards ──────────────────────────────────
        html += `<div class="analysis-section">
    <div class="section-title">Spending by Member</div>
    <div class="member-cards">`;

        state.members.forEach(m => {
            const mExps = yExps.filter(e => e.memberId === m.id);
            const mTotal = sumAmounts(mExps);
            const pct = total > 0 ? (mTotal/total*100).toFixed(1) : 0;
            const mAvg = (mTotal / monthsElapsed).toFixed(0);

            // Top 3 categories for this member
            const catTotals = {};
            mExps.forEach(e => { catTotals[e.category] = (catTotals[e.category]||0) + Number(e.amount); });
            const topCats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,3);

            html += `<div class="member-spend-card" style="border-top-color:${m.color}">
      <div class="msc-name">${m.name}</div>
      <div class="msc-total" style="color:${m.color}">${rupee(mTotal)}</div>
      <div class="msc-pct">${pct}% of total</div>
      <div class="msc-avg">Avg ${rupee(mAvg)}/month</div>
      <div class="msc-top">
        <div class="msc-top-label">Top Categories</div>
        ${topCats.length ? topCats.map(([cat,amt]) =>
                `<div class="msc-top-item">
            <span class="msc-top-cat">${cat}</span>
            <span class="msc-top-amt" style="color:${m.color}">${rupee(amt)}</span>
          </div>`).join('') : '<div style="font-size:0.72rem;color:var(--muted)">No data</div>'}
      </div>
    </div>`;
        });
        html += `</div></div>`;

        // ── 2. Household vs Personal split ────────────────────────
        const hhTotal = sumAmounts(yExps.filter(e => e.memberId === 'mh'));
        const personalTotal = total - hhTotal;
        const hhPct = total > 0 ? (hhTotal/total*100).toFixed(1) : 0;
        const persPct = total > 0 ? (personalTotal/total*100).toFixed(1) : 0;
        const hhMember = state.members.find(m => m.id === 'mh');

        html += `<div class="analysis-section">
    <div class="section-title">Household vs Personal</div>
    <div class="split-bar-wrap">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:0.8rem;color:var(--muted)">Total this year: <strong style="color:var(--text)">${rupee(total)}</strong> &nbsp;·&nbsp; Avg/month: <strong style="color:var(--text)">${rupee(avgMonthly.toFixed(0))}</strong></span>
      </div>
      <div class="split-bar">
        <div style="width:${hhPct}%;background:${hhMember?.color||'#c47ab8'}"></div>
        <div style="flex:1;background:var(--accent)"></div>
      </div>
      <div class="split-labels">
        <span class="split-label"><span class="strip-dot" style="background:${hhMember?.color||'#c47ab8'}"></span>${hhMember?.name||'Household'}: ${rupee(hhTotal)} (${hhPct}%)</span>
        <span class="split-label"><span class="strip-dot" style="background:var(--accent)"></span>Personal: ${rupee(personalTotal)} (${persPct}%)</span>
      </div>
    </div>
  </div>`;

        // ── 3. Category breakdown ──────────────────────────────────
        const catMap = {};
        yExps.forEach(e => { catMap[e.category] = (catMap[e.category]||0) + Number(e.amount); });
        const catRows = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
        const maxCat = catRows.length ? catRows[0][1] : 1;

        html += `<div class="analysis-section">
    <div class="section-title">Spending by Category</div>`;

        if (!catRows.length) {
            html += `<div class="no-data">No expenses recorded for ${y}.</div>`;
        } else {
            html += `<table class="cat-table">
      <thead><tr>
        <th>Category</th>
        <th>Total</th>
        <th>% of Year</th>
        <th>Avg/Month</th>
        <th class="cat-bar-cell"></th>
      </tr></thead><tbody>`;
            catRows.forEach(([cat, amt]) => {
                const pct = (amt/total*100).toFixed(1);
                const barW = (amt/maxCat*100).toFixed(1);
                html += `<tr>
        <td>${cat}</td>
        <td>${rupee(amt)}</td>
        <td class="cat-pct">${pct}%</td>
        <td>${rupee((amt/monthsElapsed).toFixed(0))}</td>
        <td class="cat-bar-cell"><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${barW}%"></div></div></td>
      </tr>`;
            });
            html += `</tbody></table>`;
        }
        html += `</div>`;

        // ── 4. Month-over-month by category ───────────────────────
        const topCatsMoM = catRows.slice(0, 8).map(([c]) => c);
        html += `<div class="analysis-section">
    <div class="section-title">Month-over-Month by Category (top 8)</div>
    <div class="mom-wrap">
    <table class="mom-table"><thead><tr>
      <th>Category</th>
      ${MONTH_NAMES.map(m => `<th>${m.slice(0,3)}</th>`).join('')}
      <th>Total</th>
    </tr></thead><tbody>`;

        topCatsMoM.forEach(cat => {
            html += `<tr><td>${cat}</td>`;
            let rowTotal = 0;
            for (let mo = 0; mo < 12; mo++) {
                const moExps = expsForMonth(y, mo).filter(e => e.category === cat);
                const moAmt = sumAmounts(moExps);
                rowTotal += moAmt;
                html += moAmt > 0
                    ? `<td class="has-val">${rupee(moAmt)}</td>`
                    : `<td>—</td>`;
            }
            html += `<td class="has-val">${rupee(rowTotal)}</td></tr>`;
        });

        // Totals row
        html += `<tr><td>All Categories</td>`;
        let grandTotal = 0;
        for (let mo = 0; mo < 12; mo++) {
            const moAmt = sumAmounts(expsForMonth(y, mo));
            grandTotal += moAmt;
            html += moAmt > 0 ? `<td>${rupee(moAmt)}</td>` : `<td>—</td>`;
        }
        html += `<td>${rupee(grandTotal)}</td></tr>`;
        html += `</tbody></table></div></div>`;

        // ── 5. Top 10 single expenses ──────────────────────────────
        const top10 = [...yExps].sort((a,b) => Number(b.amount)-Number(a.amount)).slice(0,10);
        html += `<div class="analysis-section">
    <div class="section-title">Top 10 Single Expenses</div>
    <div class="top-list">`;

        if (!top10.length) {
            html += `<div class="no-data">No expenses recorded for ${y}.</div>`;
        } else {
            top10.forEach((e, i) => {
                const m = member(e.memberId);
                if (!m) return;
                html += `<div class="top-item" style="border-left-color:${m.color}">
        <div class="top-rank">${i+1}</div>
        <div class="top-info">
          <div class="top-cat">${e.category}</div>
          <div class="top-sub">
            <span style="color:${m.color}">${m.name}</span>
            &nbsp;·&nbsp; ${formatDate(e.date)}
            ${e.notes ? ' &nbsp;·&nbsp; ' + e.notes : ''}
          </div>
        </div>
        <div class="top-amt" style="color:${m.color}">${rupee(e.amount)}</div>
      </div>`;
            });
        }
        html += `</div></div>`;

        // ── 6. Year-over-Year comparison ───────────────────────────
        const years = [...new Set(state.expenses.map(e => parseDate(e.date).getFullYear()))].sort((a,b)=>b-a).slice(0,5);
        html += `<div class="analysis-section">
    <div class="section-title">Year-over-Year Comparison</div>`;

        if (years.length < 2) {
            html += `<div class="no-data">Import more years of data to see year-over-year comparison.</div>`;
        } else {
            html += `<table class="yoy-table"><thead><tr>
      <th>Year</th>
      <th>Total Spend</th>
      <th>vs Prev Year</th>
      ${state.members.map(m => `<th style="color:${m.color}">${m.name}</th>`).join('')}
      <th>Avg/Month</th>
      <th>Top Category</th>
    </tr></thead><tbody>`;

            years.forEach((yr, i) => {
                const yrExps = expsForYear(yr);
                const yrTotal = sumAmounts(yrExps);
                const prevYr = years[i+1];
                const prevTotal = prevYr ? sumAmounts(expsForYear(prevYr)) : null;
                const delta = prevTotal ? ((yrTotal - prevTotal)/prevTotal*100).toFixed(1) : null;
                const yrMonths = yr === new Date().getFullYear() ? new Date().getMonth()+1 : 12;

                const yrCatMap = {};
                yrExps.forEach(e => { yrCatMap[e.category] = (yrCatMap[e.category]||0) + Number(e.amount); });
                const topCat = Object.entries(yrCatMap).sort((a,b)=>b[1]-a[1])[0];

                let deltaHtml = '—';
                if (delta !== null) {
                    const cls = Number(delta) > 0 ? 'delta-up' : 'delta-down';
                    const sign = Number(delta) > 0 ? '▲' : '▼';
                    deltaHtml = `<span class="${cls}">${sign} ${Math.abs(delta)}%</span>`;
                }

                html += `<tr>
        <td>${yr}</td>
        <td>${rupee(yrTotal)}</td>
        <td>${deltaHtml}</td>
        ${state.members.map(m => `<td>${rupee(memberTotal(m.id, yrExps))}</td>`).join('')}
        <td>${rupee((yrTotal/yrMonths).toFixed(0))}</td>
        <td>${topCat ? topCat[0] : '—'}</td>
      </tr>`;
            });
            html += `</tbody></table>`;
        }
        html += `</div>`;

        html += `</div>`; // end analysis-wrap
        return html;
    }

    function analysisNav(dir) {
        state.analysisYear += dir;
        renderApp();
    }

    function formatDate(ds) {
        const d = parseDate(ds);
        return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
    }

    // ═══════════════════════════════════════════════════════════
    // LEGEND
    // ═══════════════════════════════════════════════════════════
    function renderLegend() {
        document.getElementById('member-legend').innerHTML = state.members.map(m =>
            `<div class="member-item">
      <span class="member-dot" style="background:${m.color}"></span>
      ${m.name}
    </div>`
        ).join('');
    }

    // ═══════════════════════════════════════════════════════════
    // ADD / EDIT EXPENSE MODAL
    // ═══════════════════════════════════════════════════════════
    function openExpenseModal(dateStr) {
        state.editingId = null;
        document.querySelector('#expense-overlay .modal-title').textContent = 'Add Expense';
        document.getElementById('btn-save-expense').textContent = 'Save Expense';

        const sel = document.getElementById('f-category');
        sel.innerHTML = '<option value="">Select category...</option>' +
            state.categories.map(c => `<option value="${c}">${c}</option>`).join('');

        document.getElementById('f-date').value = dateStr || todayStr();
        document.getElementById('f-amount').value = '';
        document.getElementById('f-notes').value = '';
        state.selectedMember = null;

        document.getElementById('f-members').innerHTML = state.members.map(m =>
            `<button class="member-btn" id="mb-${m.id}"
      style="color:${m.color};border-color:${m.color}30"
      onclick="pickMember('${m.id}')">${m.name}</button>`
        ).join('');

        document.getElementById('expense-overlay').classList.add('open');
    }

    function openEditModal(id, e) {
        if (e) e.stopPropagation();
        const exp = state.expenses.find(x => x.id === id);
        if (!exp) return;

        state.editingId = id;
        document.querySelector('#expense-overlay .modal-title').textContent = 'Edit Expense';
        document.getElementById('btn-save-expense').textContent = 'Update Expense';

        const sel = document.getElementById('f-category');
        sel.innerHTML = '<option value="">Select category...</option>' +
            state.categories.map(c => `<option value="${c}">${c}</option>`).join('');
        sel.value = exp.category;

        document.getElementById('f-date').value = exp.date;
        document.getElementById('f-amount').value = exp.amount;
        document.getElementById('f-notes').value = exp.notes || '';
        state.selectedMember = exp.memberId;

        document.getElementById('f-members').innerHTML = state.members.map(m =>
            `<button class="member-btn" id="mb-${m.id}"
      style="color:${m.color};border-color:${m.color}30"
      onclick="pickMember('${m.id}')">${m.name}</button>`
        ).join('');

        // Pre-highlight the current member
        pickMember(exp.memberId);
        document.getElementById('expense-overlay').classList.add('open');
    }

    function pickMember(id) {
        state.selectedMember = id;
        state.members.forEach(m => {
            const btn = document.getElementById('mb-'+m.id);
            if (!btn) return;
            if (m.id === id) {
                btn.style.background = m.color + '25';
                btn.style.borderColor = m.color;
                btn.style.fontWeight = '600';
            } else {
                btn.style.background = 'var(--surf2)';
                btn.style.borderColor = 'var(--border)';
                btn.style.fontWeight = '500';
            }
        });
    }

    function closeExpenseModal() { document.getElementById('expense-overlay').classList.remove('open'); }
    function maybeCloseExpense(e) { if (e.target===document.getElementById('expense-overlay')) closeExpenseModal(); }

    function saveExpense() {
        const date   = document.getElementById('f-date').value;
        const amount = parseFloat(document.getElementById('f-amount').value);
        const cat    = document.getElementById('f-category').value;
        const notes  = document.getElementById('f-notes').value.trim();

        if (!date || !amount || amount <= 0 || !cat || !state.selectedMember) {
            alert('Please fill in all required fields and select a member.'); return;
        }

        if (state.editingId) {
            // Edit mode — update in place
            const idx = state.expenses.findIndex(x => x.id === state.editingId);
            if (idx !== -1) {
                state.expenses[idx] = {
                    ...state.expenses[idx],
                    date, amount, category: cat, notes,
                    memberId: state.selectedMember,
                    updatedAt: new Date().toISOString(),
                };
            }
        } else {
            // Add mode — new entry
            state.expenses.push({
                id: Date.now().toString() + Math.random().toString(36).slice(2),
                date, amount, category: cat, notes,
                memberId: state.selectedMember,
                createdAt: new Date().toISOString(),
            });
        }

        persist();
        closeExpenseModal();
        renderApp();
    }

    function deleteExpense(id, e) {
        e.stopPropagation();
        if (!confirm('Delete this expense?')) return;
        state.expenses = state.expenses.filter(ex => ex.id !== id);
        persist();
        renderApp();
    }

    // ═══════════════════════════════════════════════════════════
    // SETTINGS MODAL
    // ═══════════════════════════════════════════════════════════
    function openSettings() {
        // Member name inputs
        document.getElementById('settings-members').innerHTML = state.members.map(m =>
            `<div class="name-input-row">
      <span class="color-swatch" style="background:${m.color}"></span>
      <input class="form-input" id="sname-${m.id}" value="${m.name}" style="flex:1">
    </div>`
        ).join('');

        // Category chips
        renderCategoryChips();
        document.getElementById('new-cat-input').value = '';
        document.getElementById('settings-overlay').classList.add('open');

        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('nav-settings').classList.add('active');
    }

    function renderCategoryChips() {
        document.getElementById('settings-cats').innerHTML = state.categories.map((c,i) =>
            `<div style="display:flex;align-items:center;gap:5px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:0.78rem">
      ${c}
      <span onclick="removeCategory(${i})" style="cursor:pointer;color:var(--muted);font-size:0.8rem;line-height:1" title="Remove">✕</span>
    </div>`
        ).join('');
    }

    function addCategory() {
        const val = document.getElementById('new-cat-input').value.trim();
        if (!val || state.categories.includes(val)) return;
        state.categories.push(val);
        document.getElementById('new-cat-input').value = '';
        renderCategoryChips();
    }

    function removeCategory(idx) {
        state.categories.splice(idx, 1);
        renderCategoryChips();
    }

    function saveSettings() {
        state.members.forEach(m => {
            const inp = document.getElementById('sname-'+m.id);
            if (inp && inp.value.trim()) m.name = inp.value.trim();
        });
        persist();
        closeSettings();
        renderApp();
    }

    function closeSettings() {
        document.getElementById('settings-overlay').classList.remove('open');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const navId = state.view === 'year' ? 'nav-year' : state.view === 'analysis' ? 'nav-analysis' : 'nav-calendar';
        document.getElementById(navId).classList.add('active');
    }
    function maybeCloseSettings(e) { if (e.target===document.getElementById('settings-overlay')) { saveSettings(); } }

    // ═══════════════════════════════════════════════════════════
    // EXPORT / IMPORT
    // ═══════════════════════════════════════════════════════════
    function exportData() {
        const payload = JSON.stringify({
            version: 1, exportedAt: new Date().toISOString(),
            members: state.members, categories: state.categories,
            expenses: state.expenses,
        }, null, 2);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([payload], { type: 'application/json' }));
        a.download = `varsel-${todayStr()}.json`;
        a.click();
    }

    function triggerImport() { document.getElementById('import-input').click(); }

    function handleImport(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                if (!data.expenses) throw new Error('No expenses found');

                let added = 0, updated = 0;
                data.expenses.forEach(incoming => {
                    const idx = state.expenses.findIndex(x => x.id === incoming.id);
                    if (idx === -1) {
                        // Brand new entry
                        state.expenses.push(incoming);
                        added++;
                    } else {
                        // Exists — check if anything changed
                        const existing = state.expenses[idx];
                        const changed =
                            existing.amount   !== incoming.amount   ||
                            existing.category !== incoming.category ||
                            existing.notes    !== incoming.notes    ||
                            existing.date     !== incoming.date     ||
                            existing.memberId !== incoming.memberId;
                        if (changed) {
                            state.expenses[idx] = { ...existing, ...incoming, updatedAt: new Date().toISOString() };
                            updated++;
                        }
                    }
                });

                if (data.categories) {
                    data.categories.forEach(c => { if (!state.categories.includes(c)) state.categories.push(c); });
                }

                persist();
                renderApp();
                const parts = [];
                if (added)   parts.push(`${added} new expense${added!==1?'s':''} added`);
                if (updated) parts.push(`${updated} expense${updated!==1?'s':''} updated`);
                if (!parts.length) parts.push('no changes — everything is already up to date');
                alert('✓ Import complete: ' + parts.join(', ') + '.');
            } catch(err) { alert('Import failed: ' + err.message); }
        };
        reader.readAsText(file);
        e.target.value = '';
    }

    // ═══════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════
    hydrate();
    renderApp();
</script>
</body>
</html>
